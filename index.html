<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Theft Auto V Trailer - YouTube</title>
    <link rel="icon" type="image/png" href="https://www.youtube.com/s/desktop/282361cf/img/favicon_32x32.png">
    
    <style>
        /* --- DESIGN CORE ELEMENTS & THEME RESET --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            color: #f1f1f1;
            font-family: "Roboto", "Arial", sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- NATIVE TOP NAVIGATION ARCHITECTURE --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 56px;
            background-color: #0f0f0f;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            box-sizing: border-box;
            z-index: 1000;
        }

        .logo-section {
            display: flex;
            align-items: center;
            cursor: pointer;
        }
        
        .logo-section img {
            height: 20px;
        }

        .search-container {
            display: flex;
            align-items: center;
            width: 40%;
            max-width: 640px;
            position: relative;
        }

        .search-bar {
            width: 100%;
            height: 40px;
            background-color: #121212;
            border: 1px solid #303030;
            border-radius: 40px 0 0 40px;
            padding: 0 16px 0 48px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        
        .search-bar:focus {
            border-color: #1c62b9;
        }

        .search-btn {
            height: 40px;
            width: 64px;
            background-color: #222222;
            border: 1px solid #303030;
            border-left: none;
            border-radius: 0 40px 40px 0;
            color: white;
            cursor: pointer;
            font-size: 1rem;
        }

        .user-section {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* --- SKELETON LOADING PLACEHOLDERS --- */
        .skeleton {
            background-color: #282828;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        /* Simple loading pulse effect */
        .skeleton::after {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: translateX(-100%);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            100% { transform: translateX(100%); }
        }

        .skeleton-text {
            height: 12px;
            margin-bottom: 6px;
        }
        .skeleton-text.short { width: 60%; }
        .skeleton-text.medium { width: 85%; }

        /* --- APP SCREEN WORKSPACE LAYER --- */
        .page-container {
            margin-top: 56px;
            padding: 24px 24px 0 24px;
            display: grid;
            grid-template-columns: 1fr 402px;
            gap: 24px;
            max-width: 1754px;
            margin-left: auto;
            margin-right: auto;
            box-sizing: border-box;
        }

        /* --- PRIMARY BROADCAST BLOCK --- */
        .primary-content {
            display: flex;
            flex-direction: column;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

        .video-title {
            font-size: 1.25rem;
            font-weight: 700;
            font-family: "YouTube Sans", "Roboto", sans-serif;
            margin: 12px 0 8px 0;
            line-height: 1.4;
        }

        /* Metarow with Exact Pill Buttons matching Screenshot */
        .video-meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 12px;
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .channel-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .channel-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .subscribe-btn {
            background-color: #f1f1f1;
            color: #0f0f0f;
            border: none;
            padding: 0 16px;
            height: 36px;
            border-radius: 18px;
            font-weight: 600;
            font-size: 0.875rem;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 8px;
        }

        .utility-btn {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            padding: 0 16px;
            height: 36px;
            border-radius: 18px;
            font-weight: 500;
            font-size: 0.875rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .utility-btn:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* Boxed Description Segment */
        .video-description {
            background-color: #212121;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.875rem;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        /* --- SECONDARY RECOMMENDATION SIDEBAR --- */
        .sidebar-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Recommended cards built using Skeletons to simulate failed connection profiles */
        .recommended-card {
            display: flex;
            gap: 8px;
        }

        .thumb-box {
            width: 168px;
            height: 94px;
            border-radius: 8px;
            flex-shrink: 0;
        }

        .card-details {
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            width: 100%;
            padding-top: 4px;
        }

        /* Responsive Flow Collapse */
        @media (max-width: 1016px) {
            .page-container {
                grid-template-columns: 1fr;
                padding: 16px;
            }
        }
    </style>
</head>
<body>

</body>
</html>
