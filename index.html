<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grand Theft Auto V Trailer - YouTube</title>
    <link rel="icon" type="image/png" href="https://www.youtube.com/s/desktop/282361cf/img/favicon_32x32.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- DESIGN CORE ELEMENTS & THEME RESET --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f0f;
            color: #f1f1f1;
            font-family: "Roboto", "Arial", sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- NATIVE TOP NAVIGATION ARCHITECTURE --- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 56px;
            background-color: #0f0f0f;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            box-sizing: border-box;
            z-index: 1000;
        }

        .left-header-section {
            display: flex;
            align-items: center;
            gap: 6px; /* Matches identical spacing next to menu icon */
        }

        /* Pure CSS 3 Lines Menu Button */
        .menu-button {
            width: 40px;
            height: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            border-radius: 50%;
        }
        
        .menu-line {
            width: 18px;
            height: 2px;
            background-color: #f1f1f1;
        }

        /* Perfected Branding Image Component */
        .logo-section {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
            padding: 18px 14px 18px 8px;
        }
        
        .logo-section img {
            height: 20px; /* Precise height configuration matching desktop spec */
            display: block;
        }

        .search-container {
            display: flex;
            align-items: center;
            width: 40%;
            max-width: 640px;
        }

        .search-bar {
            width: 100%;
            height: 40px;
            background-color: #121212;
            border: 1px solid #303030;
            border-radius: 40px 0 0 40px;
            padding: 0 16px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        
        .search-bar:focus {
            border-color: #1c62b9;
        }

        .search-btn {
            height: 40px;
            width: 64px;
            background-color: #222222;
            border: 1px solid #303030;
            border-left: none;
            border-radius: 0 40px 40px 0;
            color: white;
            cursor: pointer;
        }

        .user-section {
            display: flex;
            align-items: center;
        }

        /* --- SKELETON LOADING PLACEHOLDERS --- */
        .skeleton {
            background-color: #282828;
            border-radius: 8px; /* Smooth corners for modern video assets */
            position: relative;
            overflow: hidden;
        }

        /* Continuous buffering pulse trace */
        .skeleton::after {
            content: "";
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.04), transparent);
            transform: translateX(-100%);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            100% { transform: translateX(100%); }
        }

        /* --- APP SCREEN WORKSPACE LAYER --- */
        .page-container {
            margin-top: 56px;
            padding: 24px 24px 0 24px;
            display: grid;
            grid-template-columns: 1fr 402px;
            gap: 24px;
            max-width: 1754px;
            margin-left: auto;
            margin-right: auto;
            box-sizing: border-box;
        }

        /* --- PRIMARY CONTENT COLUMN --- */
        .primary-content {
            display: flex;
            flex-direction: column;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
            background-color: #000;
            border-radius: 12px;
            overflow: hidden;
        }

        .video-wrapper iframe {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border: none;
        }

            font-size: 1.25rem;
            font-weight: 700;
